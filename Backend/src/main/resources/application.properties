spring.datasource.url=jdbc:postgresql://localhost:5432/ashasathi
spring.datasource.username=postgres
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.oauth2.client.registration.google.client-id=REDACTED_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.github.client-id=REDACTED_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=REDACTED_GITHUB_CLIENT_SECRET

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.datasource.hikari.maximum-pool-size=10
spring.jpa.open-in-view=false

app.migration.sqlite-to-postgres.enabled=true
app.migration.sqlite-path=D:/Flutter_Projects/AshaSathi/Backend/data/ashasathi.db



