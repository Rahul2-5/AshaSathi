spring.datasource.url=jdbc:sqlite:D:/Flutter_Projects/AshaSathi/Backend/data/ashasathi.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.oauth2.client.registration.google.client-id=REDACTED_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.github.client-id=REDACTED_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=REDACTED_GITHUB_CLIENT_SECRET

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.datasource.hikari.maximum-pool-size=1
spring.jpa.open-in-view=false



